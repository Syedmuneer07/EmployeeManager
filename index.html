  <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Employee Management</title>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">    
      <link rel="stylesheet" href="style.css">
      
  </head>
  <body>
      <div class="bg" aria-hidden="true"></div>
      <header class="app-header">
          <div class="container header-inner">
              <div class="brand">
                  <div class="brand-mark" aria-hidden="true">👥</div>
                  <div>
                      <h1>Employee Management</h1>
                      <p class="subtitle">Add, update, delete and search employees</p>
                  </div>
              </div>

              <div class="header-actions">
                  <div class="stat">
                      <div class="stat-value" id="employeeCount"></div>
                      <div class="stat-label">Employees</div>
                  </div>
              </div>
          </div>
      </header>

      <main class="container page">
          <section class="panel">
              <div class="panel-head">
                  <h2>Add Employee</h2>
                  <p class="panel-hint">Fill all fields and click <b>Add Employee</b></p>
              </div>

              <div class="card" style="margin:0;">
                  <form id="empForm">
                  <div class="input-group">
                      <label for="id">ID</label>
                      <input type="text" id="id" required>
                  </div>
                  <div class="input-group">
                      <label for="username">Username</label>
                      <input type="text" id="username" required>
                  </div>
                  <div class="input-group">
                      <label for="email">Email</label>
                      <input type="email" id="email" required>
                  </div>
                  <div class="input-group">
                      <label for="phone">Phone Number</label>
                      <input type="text" id="phone" required>
                  </div>
                  <div class="input-group">
                      <label for="designation">Designation</label>
                      <input type="text" id="designation" required>
                  </div>
                  <div class="input-group">
                      <label for="employeeId">Employee ID</label>
                      <input type="text" id="employeeId" required>
                  </div>
                  <div class="input-group">
                      <label>&nbsp;</label>
                      <button type="submit" class="btn-primary">Add Employee</button>
                  </div>
                  <div class="input-group">
                      <label>&nbsp;</label>
                      <button type="button" class="btn-secondary" onclick="resetForm()">Reset</button>
                  </div>
              </form>
              </div>
          </section>

          <section class="panel">
              <div class="panel-head employee-list-head">
                  <h2>Employee List</h2>
                  <div class="search-container" role="search" aria-label="Search employees">
                      <input type="text" id="search" placeholder="Search by any field...">
                      <button type="button" class="btn-primary" onclick="searchEmployees()">Search</button>
                  </div>
              </div>

              <div class="card">
                  <div class="card1">
                      <div class="table-wrap">
                          <table>
                              <thead>
                                  <tr>
                                      <th>ID</th>
                                      <th>Username</th>
                                      <th>Email</th>
                                      <th>Phone Number</th>
                                      <th>Designation</th>
                                      <th>Employee ID</th>
                                      <th style="width: 180px;">Actions</th>
                                  </tr>
                              </thead>
                              <tbody id="empTableBody"></tbody>
                          </table>
                      </div>
                  </div>
              </div>
          </section>
      </main>

      <!-- Update Modal -->
      <div id="updateModal" class="modal-overlay">
          <div class="modal">
              <div class="modal-header">
                  <h3 class="modal-title">Update Employee</h3>
                  <button class="modal-close" onclick="closeUpdateModal()">&times;</button>
              </div>
              <div class="modal-body">
                  <div class="input-group">
                      <label for="updateUsername">Username</label>
                      <input type="text" id="updateUsername" required>
                  </div>
                  <div class="input-group">
                      <label for="updatePhone">Phone Number</label>
                      <input type="text" id="updatePhone" required>
                  </div>
                  <div class="input-group">
                      <label for="updateDesignation">Designation</label>
                      <input type="text" id="updateDesignation" required>
                  </div>
              </div>
              <div class="modal-footer">
                  <button class="btn-secondary" onclick="closeUpdateModal()">Cancel</button>
                  <button class="btn-primary" onclick="confirmUpdate()">Update</button>
              </div>
          </div>
      </div>

      <!-- Delete Confirmation Modal -->
      <div id="deleteModal" class="modal-overlay">
          <div class="modal">
              <div class="modal-header">
                  <h3 class="modal-title">Confirm Delete</h3>
                  <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
              </div>
              <div class="modal-body">
                  <p>Are you sure you want to delete this employee?</p>
              </div>
              <div class="modal-footer">
                  <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                  <button class="btn-danger" onclick="confirmDelete()">Delete</button>
              </div>
          </div>
      </div>

      <!-- Toast Notification -->
      <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
  </body>
  </html>
